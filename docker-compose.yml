services:
  vkbot:
    image: python:3.12-slim
    container_name: vkbottle_bot
    restart: unless-stopped

    working_dir: /app

    volumes:
      - /mnt/HDD/vk-bot:/app

    env_file:
      - stack.env

    environment:
      - PYTHONUNBUFFERED=1

    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -m watchfiles 'python bot.py' /app --filter python"

    healthcheck:
      test: ["CMD", "python", "-c", "import vkbottle"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
